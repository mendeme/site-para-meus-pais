<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para minha irmã 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe4f0 0%, #ffd6e8 40%, #fce4ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    .sparkles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border: 2px solid #ffb3d9;
      border-radius: 32px;
      padding: 3rem 3.5rem;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(255, 100, 180, 0.2);
      animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .gifs {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }

    .gifs img {
      width: 110px;
      height: 110px;
      border-radius: 18px;
      border: 3px solid #ffb3d9;
      object-fit: cover;
      transition: transform 0.2s;
    }

    .gifs img:hover {
      transform: scale(1.08) rotate(-2deg);
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.2rem;
      color: #d6417a;
      margin-bottom: 0.8rem;
      line-height: 1.3;
      text-shadow: 2px 2px 0 #ffe4f0;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #b05080;
      margin-bottom: 2rem;
    }

    .hearts {
      font-size: 2rem;
      animation: pulse 1.2s ease-in-out infinite;
      display: inline-block;
      margin-top: 1rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff80b5, #ff4d9e);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 999px;
      margin-top: 1.5rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="sparkles" id="sparkles"></div>

  <div class="card">
    <div class="gifs">
      <img src="https://media.giphy.com/media/l4KibWpBGWchSqCRy/giphy.gif" alt="gif fofo 1" />
      <img src="https://media.giphy.com/media/3oEjHV0z8S7WM4MwnK/giphy.gif" alt="gif fofo 2" />
      <img src="https://media.giphy.com/media/26BRzozg4TCBXv6QU/giphy.gif" alt="gif fofo 3" />
    </div>

    <h1>Você é uma irmã legal 💖</h1>
    <p class="subtitle">Feito com muito amor pra você 🌸</p>

    <div class="hearts">💕 💗 💕</div>

    <br/>
    <span class="badge">com carinho 🌷</span>
  </div>

  <script>
    const emojis = ['🌸','💕','✨','🌷','💖','🌺','🎀','💫','🩷'];
    const container = document.getElementById('sparkles');
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span');
      el.className = 'sparkle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
      el.style.animationDuration = (6 + Math.random() * 10) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(el);
    }
  </script>

</body>
</html>
